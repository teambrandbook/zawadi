version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-zawadi}
      POSTGRES_USER: ${DB_USER:-zawadi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zawadi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zawadi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_ENGINE: postgresql
      DB_NAME: ${DB_NAME:-zawadi}
      DB_USER: ${DB_USER:-zawadi}
      DB_PASSWORD: ${DB_PASSWORD:-zawadi}
      DB_HOST: db
      DB_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # NOTE: NEXT_PUBLIC_ vars are embedded at build time.
      # For production, rebuild the image with the real server IP.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  media_files:
